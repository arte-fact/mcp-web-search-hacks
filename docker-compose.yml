services:
  mcp-server:
    build: .
    command: ["--bind", "0.0.0.0:3000", "--base-url", "${MCP_BASE_URL}"]
    environment:
      MCP_ADMIN_PASSWORD: ${MCP_ADMIN_PASSWORD}
      RUST_LOG: info
    networks:
      - default
      - traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_default
      - traefik.http.routers.mcp.rule=Host(`${MCP_HOST}`)
      - traefik.http.routers.mcp.entrypoints=websecure
      - traefik.http.routers.mcp.tls.certresolver=letsencrypt
      - traefik.http.services.mcp.loadbalancer.server.port=3000
    restart: unless-stopped

networks:
  traefik:
    external: true
    name: traefik_default
