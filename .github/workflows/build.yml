name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mcp-web-search-hacks
            use-cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: mcp-web-search-hacks
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: mcp-web-search-hacks
            use-cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: mcp-web-search-hacks
            use-cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: mcp-web-search-hacks.exe
            use-cross: true

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: "!matrix.use-cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Smoke test
        if: "!matrix.use-cross"
        shell: bash
        run: |
          binary="target/${{ matrix.target }}/release/${{ matrix.artifact }}"
          if [ ! -f "$binary" ]; then
            echo "ERROR: Binary not found at $binary"
            exit 1
          fi
          file_size=$(wc -c < "$binary")
          echo "Binary size: $file_size bytes"
          if [ "$file_size" -lt 1000000 ]; then
            echo "WARNING: Binary seems too small"
          fi
          echo "Binary exists and looks reasonable"

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../mcp-web-search-hacks-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ../../../mcp-web-search-hacks-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: mcp-web-search-hacks-${{ matrix.target }}
          path: mcp-web-search-hacks-${{ matrix.target }}.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Prerequisites

            **Google Chrome or Chromium must be installed** on the target machine. The binary communicates with Chrome via the DevTools Protocol — it does not bundle a browser.

            ## Installation

            Download the archive for your platform, extract it, and place the binary in your PATH.

            ## Configuration

            Add to your MCP client settings:

            ```json
            {
              "mcpServers": {
                "mcp-web-search-hacks": {
                  "command": "/path/to/mcp-web-search-hacks"
                }
              }
            }
            ```
          files: artifacts/*
